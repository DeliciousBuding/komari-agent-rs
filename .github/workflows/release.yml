name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-linux-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: cargo build --release --target x86_64-unknown-linux-musl --features full
      - name: Check binary size < 2MB
        run: |
          SIZE=$(stat -c%s target/x86_64-unknown-linux-musl/release/komari-agent-rs)
          if [ "$SIZE" -ge 2097152 ]; then
            echo "::error::Binary size $SIZE bytes exceeds 2MB limit"
            exit 1
          fi
      - name: Prepare artifact
        run: cp target/x86_64-unknown-linux-musl/release/komari-agent-rs komari-agent-rs-linux-x86_64
      - uses: actions/upload-artifact@v7
        with:
          name: linux-musl
          path: komari-agent-rs-linux-x86_64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --features full
      - name: Check binary size < 2MB
        shell: pwsh
        run: |
          $size = (Get-Item target\release\komari-agent-rs.exe).Length
          if ($size -ge 2097152) {
            Write-Error "Binary size $size bytes exceeds 2MB limit"
            exit 1
          }
      - name: Prepare artifact
        shell: bash
        run: cp target/release/komari-agent-rs.exe komari-agent-rs-windows-x86_64.exe
      - uses: actions/upload-artifact@v7
        with:
          name: windows-msvc
          path: komari-agent-rs-windows-x86_64.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --features full
      - name: Check binary size < 2MB
        run: |
          SIZE=$(stat -f%z target/release/komari-agent-rs)
          if [ "$SIZE" -ge 2097152 ]; then
            echo "::error::Binary size $SIZE bytes exceeds 2MB limit"
            exit 1
          fi
      - name: Prepare artifact
        run: cp target/release/komari-agent-rs komari-agent-rs-macos-x86_64
      - uses: actions/upload-artifact@v7
        with:
          name: macos
          path: komari-agent-rs-macos-x86_64

  build-freebsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cross
      - run: cross build --release --target x86_64-unknown-freebsd --features full
      - name: Prepare artifact
        run: cp target/x86_64-unknown-freebsd/release/komari-agent-rs komari-agent-rs-freebsd-x86_64
      - uses: actions/upload-artifact@v7
        with:
          name: freebsd
          path: komari-agent-rs-freebsd-x86_64

  build-linux-musl-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
      - uses: taiki-e/install-action@cross
      - run: cross build --release --target aarch64-unknown-linux-musl --features full
      - name: Check binary size < 2MB
        run: |
          SIZE=$(stat -c%s target/aarch64-unknown-linux-musl/release/komari-agent-rs)
          if [ "$SIZE" -ge 2097152 ]; then
            echo "::error::Binary size $SIZE bytes exceeds 2MB limit"
            exit 1
          fi
      - name: Prepare artifact
        run: cp target/aarch64-unknown-linux-musl/release/komari-agent-rs komari-agent-rs-linux-arm64
      - uses: actions/upload-artifact@v7
        with:
          name: linux-musl-arm64
          path: komari-agent-rs-linux-arm64

  build-macos-arm64:
    # macos-latest is Apple Silicon (M1) — native aarch64 build, no cross needed.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - run: cargo build --release --target aarch64-apple-darwin --features full
      - name: Check binary size < 2MB
        run: |
          SIZE=$(stat -f%z target/aarch64-apple-darwin/release/komari-agent-rs)
          if [ "$SIZE" -ge 2097152 ]; then
            echo "::error::Binary size $SIZE bytes exceeds 2MB limit"
            exit 1
          fi
      - name: Prepare artifact
        run: cp target/aarch64-apple-darwin/release/komari-agent-rs komari-agent-rs-macos-arm64
      - uses: actions/upload-artifact@v7
        with:
          name: macos-arm64
          path: komari-agent-rs-macos-arm64

  create-release:
    needs: [build-linux-musl, build-linux-musl-arm64, build-windows, build-macos, build-macos-arm64, build-freebsd]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
          path: artifacts
      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > checksums.txt
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
